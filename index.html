<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مبادرة ارتقاء التعليمية</title>
    <style>
        :root {
            --primary-blue: #1a2a6c; 
            --gold: #b48c0b;
            --bg-gray: #f4f7f9;
            --white: #ffffff;
            --drawer-bg: #1a2a6c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; background-color: var(--bg-gray);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        /* --- تصميم الشعار الجديد برمجياً لضمان الظهور --- */
        .rtiqa-logo-container {
            background-color: #000; /* خلفية سوداء مطابقة للصورة */
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            width: 90%;
            max-width: 350px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 2px solid var(--gold);
        }

        .rtiqa-frame {
            border: 2px solid var(--gold);
            padding: 15px;
            position: relative;
            text-align: center;
        }

        .students-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        .student-head {
            width: 12px; height: 12px;
            background: var(--gold);
            border-radius: 50%;
            position: relative;
        }

        .student-head::after {
            content: '🎓';
            position: absolute;
            top: -12px; left: -2px;
            font-size: 10px;
        }

        .main-word {
            color: #fff;
            font-size: 3.5rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: -2px;
        }

        .sub-phrase {
            color: #fff;
            font-size: 0.9rem;
            margin-top: 5px;
            border-top: 1px solid var(--gold);
            padding-top: 5px;
        }

        /* --- باقي تنسيقات المنصة والقائمة --- */
        .drawer-logo-circle {
            width: 85px; height: 85px; border-radius: 50%;
            border: 3px solid var(--gold); margin: 0 auto 10px;
            overflow: hidden; background: white;
            display: flex; align-items: center; justify-content: center;
        }
        .drawer-logo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .header-bar {
            width: 100%; height: 60px; background: var(--primary-blue);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box; color: white;
            position: fixed; top: 0; z-index: 1000;
        }

        .drawer-btn { font-size: 24px; cursor: pointer; color: var(--gold); background: none; border: none; }

        .drawer {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--drawer-bg); transition: 0.3s ease; z-index: 2000; color: white;
        }
        .drawer.open { right: 0; }
        .drawer-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .drawer-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }

        .main-content { margin-top: 80px; width: 100%; display: flex; justify-content: center; padding: 10px; box-sizing: border-box; }

        .container {
            width: 100%; max-width: 550px; background: var(--white);
            padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center; display: none; margin-bottom: 40px;
        }
        .active { display: block; animation: fadeIn 0.4s ease; }

        select, input {
            width: 100%; padding: 15px; border: 2px solid #eef2f6; border-radius: 15px;
            font-size: 1.1rem; margin-bottom: 15px; text-align: center; outline: none; background: #f8fafc;
        }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 15px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-main { background: var(--primary-blue); color: white; }
        .btn-home { background: #94a3b8; color: white; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="sideDrawer" class="drawer">
        <div class="drawer-header">
            <div class="drawer-logo-circle">
                <img src="https://raw.githubusercontent.com/aliali1981/yazeed-school/a50150e66ccf86f423cce81d6d402473c4bf15bb/logo.png" alt="شعار المدرسة">
            </div>
            <h3 style="margin:5px 0;">مدرسة يزيد بن الحارث</h3>
            <p style="color: var(--gold); font-size: 0.9rem;">مبادرة ارتقاء</p>
        </div>
        <div class="drawer-item" onclick="forceReturnHome()">🏠 الصفحة الرئيسية</div>
        <div class="drawer-item" onclick="openLibrary()">📚 مكتبة المبادرة</div>
        <div class="drawer-item" onclick="alert('تواصل مع الأستاذ هشام الكحالي')">📞 تواصل معنا</div>
    </div>
    <div id="overlay" class="overlay" onclick="toggleDrawer()"></div>

    <div class="header-bar">
        <button class="drawer-btn" onclick="toggleDrawer()">☰</button>
        <div style="font-weight: bold;">منصة ارتقاء التعليمية</div>
        <div style="width: 30px;"></div>
    </div>

    <div class="main-content">
        <div id="screen_start" class="container active">
            
            <div class="rtiqa-logo-container">
                <div class="rtiqa-frame">
                    <div class="students-row">
                        <div class="student-head"></div>
                        <div class="student-head"></div>
                        <div class="student-head"></div>
                        <div class="student-head"></div>
                    </div>
                    <h1 class="main-word">إرتقاء</h1>
                    <div class="sub-phrase">نرمم الأساس لنبني الإنجاز</div>
                </div>
            </div>

            <h2 style="color: var(--primary-blue); margin-top: 10px;">تسجيل الدخول</h2>

            <select id="sel_class" onchange="updateStudentNames()">
                <option value="" disabled selected>-- اختر الفصل --</option>
                <option>7-1</option><option>7-2</option><option>7-3</option>
            </select>
            <select id="sel_name"><option value="" disabled selected>-- اختر اسمك --</option></select>
            <button class="btn btn-main" onclick="goToPassword()">دخول للمنصة 🚀</button>
        </div>

        <div id="screen_pass" class="container">
            <h2 id="user_display"></h2>
            <input type="password" id="input_pass" placeholder="أدخل رقم القائمة">
            <button class="btn btn-main" onclick="verifyUser()">تأكيد الدخول 🎯</button>
            <button class="btn btn-home" onclick="forceReturnHome()">🏠 إلغاء</button>
        </div>
    </div>

    <script>
        const studentsData = { "7-1": ["احمد امجد احمد نجاد", "أحمد بن سعيد بن صالح جداد", "العبد بن محمد بن زائد مسن", "النابي بن محمد بن سهيل مسن", "بخيت بن احمد بن فريح مسن", "تميم بن محمد بن جديد جداد", "تميم بن محمد بن عبدالله المسهلي", "حمد بن محمد بن احمد الهزار", "حمد بن محمد بن سعيد مسن", "راشد بن محمد بن احمد مسن", "سالم بن سعد بن صلاح رعفيت", "سعيد بن شهاب بن احمد مسن", "سعيد بن محمد بن صالح جداد", "سعيد بن محمد بن مبارك جداد", "سلطان بن حمزة بن مسلم ربعات", "عامر بن محمد بن مسلم المسهلي", "عبد الله بن سالم بن سليم قمصيت", "عمر احمد محمد احمد", "عمر عبد القوي ابراهيم", "فريح بن عبد الله بن فريح مسن", "مجتبى عيسى محمد", "مسلم بن محمد بن عوض الوهيبي", "ناصر بن سالم بن ظويهر جداد", "ياسر بن عادل بن سالم مسن", "يوسف عمر احمد عبد الرحمن"], "7-2": ["ابراهيم محمد سالم السطري", "العباس بن مبخوت بن سالم مسن", "المنذر بن فواز بن عبدالله الهاشمي", "امير بن nاصر بن عبدالله البلوشي", "حسين سلامه حسين شليل", "خالد بن سالم بن علي العلوي", "خالد بن محمد بن مطر جداد", "خالد بن مسلم بن احمد جداد", "رويزم بن مسلم بن صندل المحرمي", "سالم بن مبارك بن محمد الراشدي", "سعد بن محمد بن حفيظ خوار", "سعود بن عبد الله بن بخيت مسن", "سعيد بن عبد الله بن احمد جداد", "سعيد بن مسلم بن عبدالله جداد", "سلطان بن مسلم بن صالح جداد", "عبد الله بن عارف بن سالم جداد", "علي بن سعيد بن علي خوار", "عمر فؤاد فهمي فؤاد", "فهد بن غانم بن سالم جداد", "محسن معتصم محمد الامام", "محمد بن سالم بن مبخوت الراشدي", "مسلم بن سالم بن سهيل الراشدي", "مصطفى محمود كريم احمد", "معاذ احمد سميح علي سيد", "منيف بن سعيد بن محمد جداد", "هادف بن سعيد بن حسن خوار", "وائل بن حمود بن سالم الوائلي"], "7-3": ["أحمد بن نايف بن عبدالله جداد", "الطلح بن سالم بن حسن خوار", "بخيت بن مسلم سالم الراشدي", "بدر بن عامر بن مسلم جداد", "حثيث بن سلطان بن محمد مسن", "حمد بن محمد بن عبدالله جداد", "سالم بن احمد بن سالم جداد", "سعيد بن مبروك بن سالم المسهلي", "سهيل بن عبدالله بن سهيل خوار", "عبد الله أمير عبدالله نصر", "عبدالله بن محمد بن علي العامري", "علي بن ثاني بن علي جداد", "فارس زياد محمد ابو رواع", "مبارك بن سعيد بن سالم مسن", "محسن بن عقيل بن سالم خوار", "محمد بن بخيت بن فرج المهري", "محمد بن علي بن بخيت الراشدي", "محمد بن غانم بن الرضه جداد", "محمد بن مسلم بن محمد جداد", "محمد بن ناصر بن عبدالله جداد", "محمد بن هيثم بن سالم جداد", "مسلم بن حسن بن هادف خوار", "معاذ فؤاد الحنيش الاحمد", "ناصر بن علي بن ناصر جداد", "نور الدين محسن العلي", "هيثم بن محمد بن سالم جداد"] };

        function toggleDrawer() { document.getElementById('sideDrawer').classList.toggle('open'); document.getElementById('overlay').style.display = document.getElementById('overlay').style.display === 'block' ? 'none' : 'block'; }
        function forceReturnHome() { changePage('screen_start'); document.getElementById('sideDrawer').classList.remove('open'); document.getElementById('overlay').style.display = 'none'; }
        
        function updateStudentNames() {
            const cls = document.getElementById('sel_class').value;
            const sel = document.getElementById('sel_name');
            sel.innerHTML = '<option value="" disabled selected>-- اختر اسمك --</option>';
            studentsData[cls].forEach((n, i) => {
                let o = document.createElement('option'); o.value = n; o.innerText = `${i+1}. ${n}`; sel.appendChild(o);
            });
        }

        function goToPassword() {
            const sel = document.getElementById('sel_name');
            if(!sel.value) return alert("اختر الاسم أولاً!");
            document.getElementById('user_display').innerText = `أهلاً بك: ${sel.value.split(' ')[0]}`;
            changePage('screen_pass');
        }

        function verifyUser() { alert("تم تسجيل الدخول بنجاح"); forceReturnHome(); }

        function changePage(id) {
            document.querySelectorAll('.container').forEach(c => { c.classList.remove('active'); c.style.display = 'none'; });
            document.getElementById(id).style.display = 'block';
            setTimeout(() => document.getElementById(id).classList.add('active'), 50);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة بَيَان التعليمية</title>
    <style>
        :root {
            --primary-blue: #1a2a6c; 
            --gold: #b48c0b;
            --bg-gray: #f4f7f9;
            --white: #ffffff;
            --drawer-bg: #1a2a6c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; background-color: var(--bg-gray);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .header-bar {
            width: 100%; height: 60px; background: var(--primary-blue);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; box-sizing: border-box; color: white;
            position: fixed; top: 0; z-index: 1000;
        }

        .drawer-btn { font-size: 24px; cursor: pointer; color: var(--gold); background: none; border: none; outline: none; }

        .drawer {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--drawer-bg); transition: 0.3s ease; z-index: 2000;
            box-shadow: -5px 0 15px rgba(0,0,0,0.3); color: white;
        }
        .drawer.open { right: 0; }
        .drawer-header { padding: 30px 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .drawer-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }

        .main-content { margin-top: 80px; width: 100%; display: flex; justify-content: center; padding: 10px; box-sizing: border-box; }

        .container {
            width: 100%; max-width: 550px; background: var(--white);
            padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center; display: none; margin-bottom: 30px;
        }

        .active { display: block; animation: fadeIn 0.3s ease; }

        .quiz-section {
            background: #f8fafc; border-radius: 15px; padding: 15px; margin-bottom: 15px;
            border: 1px solid #e2e8f0; text-align: right;
        }
        .section-title {
            display: flex; align-items: center; gap: 8px; color: var(--primary-blue);
            font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid var(--gold);
            padding-bottom: 5px; width: fit-content;
        }
        
        /* جعل اليوتيوب متجاوباً */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            border: 2px solid var(--gold);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .logo-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--gold); margin-bottom: 10px; background: white; }
        
        select, input {
            width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px;
            font-size: 1.1rem; margin-bottom: 15px; text-align: center; box-sizing: border-box;
        }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn-main { background: var(--primary-blue); color: white; }
        .btn-home { background: #64748b; color: white; }

        .option-card { display: block; background: #f1f5f9; padding: 15px; border-radius: 12px; margin: 10px 0; cursor: pointer; border: 2px solid transparent; text-align: right; }
        .option-card:hover { border-color: var(--gold); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="sideDrawer" class="drawer">
        <div class="drawer-header"><h3>مدرسة يزيد بن الحارث</h3></div>
        <div class="drawer-item" onclick="location.reload()">🏠 الصفحة الرئيسية</div>
    </div>
    <div id="overlay" class="overlay" onclick="toggleDrawer()"></div>

    <div class="header-bar">
        <button class="drawer-btn" onclick="toggleDrawer()">☰</button>
        <div style="font-weight: bold;">منصة بَيَان</div>
        <div style="width: 30px;"></div>
    </div>

    <div class="main-content">
        <div id="screen_start" class="container active">
            <img src="https://raw.githubusercontent.com/aliali1981/yazeed-school/main/logo.png" class="logo-img">
            <h2>مرحباً بك في بَيَان</h2>
            <select id="sel_class" onchange="updateNames()">
                <option value="" disabled selected>-- اختر الفصل --</option>
                <option>7-1</option><option>7-2</option><option>7-3</option>
            </select>
            <select id="sel_name"><option value="" disabled selected>-- اختر اسمك --</option></select>
            <button class="btn btn-main" onclick="goToPassword()">دخول للمنصة 🚀</button>
        </div>

        <div id="screen_pass" class="container">
            <h2 id="user_display"></h2>
            <input type="password" id="input_pass" placeholder="رقم القائمة">
            <button class="btn btn-main" onclick="verifyUser()">تأكيد 🎯</button>
        </div>

        <div id="screen_quiz" class="container">
            <h3 id="act_title" style="color:var(--primary-blue);"></h3>
            
            <div class="quiz-section">
                <div class="section-title">📺 شاهد الفيديو التعليمي:</div>
                <div class="video-wrapper">
                    <iframe id="main_vid" src="" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>

            <div class="quiz-section">
                <div class="section-title">📝 اختبر فهمك:</div>
                <div id="questions_area"></div>
            </div>

            <button class="btn btn-main" onclick="finishQuiz()">إرسال الإجابة 💾</button>
        </div>
    </div>

    <script>
        const students = { "7-1": ["أحمد بن سعيد جداد", "سعيد بن محمد مسن"], "7-2": ["علي بن بخيت خوار"], "7-3": ["محمد بن ناصر جداد"] }; 
        // ملاحظة: يمكنك وضع قائمة الطلاب الكاملة هنا كما في الأكواد السابقة
        
        const quizData = {
            "علاجي": { title: "تنوين الفتح", vid: "https://www.youtube.com/embed/lwokjBeue8I?si=6MHPslHgEuA_9Rwv", q: "ما هي الكتابة الصحيحة؟", o: ["سماءً", "سماءاً"], a: 0 }
        };

        function toggleDrawer() { 
            const d = document.getElementById('sideDrawer');
            d.classList.toggle('open');
            document.getElementById('overlay').style.display = d.classList.contains('open') ? 'block' : 'none';
        }

        function updateNames() {
            const cls = document.getElementById('sel_class').value;
            const sel = document.getElementById('sel_name');
            sel.innerHTML = '<option value="" disabled selected>-- اختر اسمك --</option>';
            students[cls].forEach((n, i) => {
                let o = document.createElement('option'); o.value = n; o.dataset.idx = i + 1;
                o.innerText = n; sel.appendChild(o);
            });
        }

        function goToPassword() {
            const name = document.getElementById('sel_name').value;
            if(!name) return alert("اختر الاسم!");
            document.getElementById('user_display').innerText = "أهلاً بك: " + name;
            changePage('screen_pass');
        }

        function verifyUser() {
            // للتسهيل: أي كلمة مرور ستدخل (يمكنك ربطها برقم القائمة لاحقاً)
            startActivity();
        }

        function startActivity() {
            const data = quizData["علاجي"];
            document.getElementById('act_title').innerText = data.title;
            document.getElementById('main_vid').src = data.vid;
            document.getElementById('questions_area').innerHTML = `
                <p>${data.q}</p>
                ${data.o.map((opt, i) => `<label class="option-card"><input type="radio" name="q1" value="${i}"> ${opt}</label>`).join('')}
            `;
            changePage('screen_quiz');
        }

        function finishQuiz() {
            alert("تم حفظ إجابتك بنجاح! شكراً لك.");
            location.reload();
        }

        function changePage(id) {
            document.querySelectorAll('.container').forEach(c => { c.classList.remove('active'); c.style.display = 'none'; });
            document.getElementById(id).style.display = 'block';
            setTimeout(() => document.getElementById(id).classList.add('active'), 50);
        }
    </script>
</body>
</html>

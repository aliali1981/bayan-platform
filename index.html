<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>منصة ارتقاء التعليمية - مدرسة يزيد بن الحارث</title>
    <style>
        :root { --primary: #1a2a6c; --gold: #b48c0b; --bg: #f4f7f9; --white: #ffffff; --success: #22c55e; --danger: #ef4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 90px; }
        
        /* الهيدر والقائمة الجانبية */
        .header-bar { width: 100%; height: 60px; background: var(--primary); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; box-sizing: border-box; color: white; position: fixed; top: 0; z-index: 1000; }
        .drawer { position: fixed; top: 0; right: -280px; width: 280px; height: 100%; background: var(--primary); transition: 0.3s ease; z-index: 2000; color: white; padding-top: 20px; }
        .drawer.open { right: 0; }
        .drawer-item { padding: 15px 25px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .drawer-item:hover { background: rgba(255,255,255,0.1); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 1500; }

        /* الحاويات الرئيسية */
        .container { width: 92%; max-width: 700px; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; margin-top: 80px; display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active { display: block; }

        /* دائرة الشعار */
        .rtiqa-logo-circle { width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%; background: #000; border: 4px solid var(--gold); display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .rtiqa-logo-circle img { width: 100%; height: auto; }

        /* تصميم الشرح "الممل" والتفصيلي */
        .lesson-section { text-align: right; background: #fff; border-right: 6px solid var(--gold); padding: 20px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .lesson-title { color: var(--primary); font-size: 1.4rem; font-weight: bold; border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px; }
        .lesson-subtitle { color: var(--gold); font-weight: bold; margin-top: 15px; }
        .example-box { background: #fffcf0; border: 1px dashed var(--gold); padding: 12px; border-radius: 8px; margin: 10px 0; font-weight: 500; color: #444; }
        .parsing-table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #f8fafc; }
        .parsing-table td { border: 1px solid #e2e8f0; padding: 10px; font-size: 0.95rem; }
        .parsing-table tr td:first-child { font-weight: bold; color: var(--primary); width: 30%; }

        /* المؤقت الزمني */
        #timer_display { font-size: 1.5rem; font-weight: bold; color: var(--primary); background: #eef2f6; padding: 10px 25px; border-radius: 50px; margin-bottom: 20px; display: inline-block; border: 2px solid var(--gold); }
        .timer-warning { color: var(--danger) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.3s; }
        .btn-main:hover { opacity: 0.9; transform: scale(1.02); }
        .fixed-footer { position: fixed; bottom: 0; width: 100%; background: var(--white); border-top: 2px solid var(--gold); display: flex; justify-content: space-between; padding: 10px 20px; box-sizing: border-box; z-index: 1000; font-size: 0.75rem; }
    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div id="sideDrawer" class="drawer">
        <div class="drawer-item" onclick="goToHome()">🏠 الصفحة الرئيسية</div>
        <div class="drawer-item" onclick="goToExplain()">📖 موسوعة الشرح</div>
        <div class="drawer-item" onclick="location.reload()">🔄 تسجيل خروج</div>
    </div>
    <div id="overlay" class="overlay" onclick="toggleDrawer()"></div>

    <!-- بار التنقل العلوي -->
    <div class="header-bar">
        <button onclick="toggleDrawer()" style="background:none; border:none; color:var(--gold); font-size:24px; cursor:pointer;">☰</button>
        <div style="font-weight: bold;">منصة ارتقاء التعليمية</div>
        <div id="user_init" style="background:var(--gold); width:35px; height:35px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; color:white;">؟</div>
    </div>

    <!-- 1. شاشة الدخول -->
    <div id="screen_login" class="container active">
        <div class="rtiqa-logo-circle">
            <img src="https://raw.githubusercontent.com/aliali1981/bayan-platform/fba633b5ad65c9685dede092b3c03cfb1197c6b9/irtiqaa.png" alt="الشعار">
        </div>
        <h3>مرحباً بك في منصة ارتقاء</h3>
        <select id="sel_class" onchange="updateStudents()" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;"><option value="" disabled selected>-- اختر الفصل --</option><option>7-1</option><option>7-2</option><option>7-3</option></select>
        <select id="sel_name" style="width:100%; padding:12px; margin-bottom:20px; border-radius:8px; border:1px solid #ccc;"><option value="" disabled selected>-- اختر اسمك --</option></select>
        <button class="btn-main" onclick="handleLogin()">دخول للتعلم 🚀</button>
    </div>

    <!-- 2. القائمة الرئيسية -->
    <div id="screen_menu" class="container">
        <div class="rtiqa-logo-circle" style="width: 80px; height: 80px;">
            <img src="https://raw.githubusercontent.com/aliali1981/bayan-platform/fba633b5ad65c9685dede092b3c03cfb1197c6b9/irtiqaa.png" alt="الشعار">
        </div>
        <h4 id="welcome_msg" style="color:var(--primary); margin:0; font-size:1.3rem;"></h4>
        <p id="path_desc" style="font-size:1rem; color:#666; margin-bottom:25px;"></p>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn-main" onclick="goToExplain()" style="background:#fff; color:var(--primary); border:2px solid var(--primary);">📖 شرح القواعد</button>
            <button class="btn-main" onclick="showScreen('screen_activities')">✍️ ماراثون النحو</button>
        </div>
    </div>

    <!-- 3. شاشة الشرح "الممل" والمفصل -->
    <div id="screen_explain" class="container">
        <h2 style="color:var(--primary); margin-bottom:25px;">الموسوعة النحوية الشاملة</h2>
        <div id="explain_area" style="overflow-y:auto; max-height:500px; padding-left:10px;">
            <!-- محتوى الشرح سيتم حقنه هنا -->
        </div>
        <button class="btn-main" style="margin-top:20px; background:#64748b;" onclick="showScreen('screen_menu')">فهمت القواعد جيداً، عودة</button>
    </div>

    <!-- 4. شاشة النشاط (المؤقت والأسئلة) -->
    <div id="screen_quiz" class="container">
        <div id="timer_display">15:00</div>
        <div id="quiz_content" style="text-align:right;"></div>
        <button id="next_btn" class="btn-main" style="display:none; margin-top:20px;" onclick="nextQuestion()">تأكيد الإجابة ➔</button>
    </div>

    <!-- 5. شاشة قائمة الأنشطة -->
    <div id="screen_activities" class="container">
        <h3 style="color:var(--primary)">ابدأ التحدي النحوي</h3>
        <div id="main_grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px;"></div>
        <button class="btn-main" style="background:#64748b;" onclick="showScreen('screen_menu')">عودة</button>
    </div>

    <!-- 6. شاشة النتائج والتغذية الراجعة -->
    <div id="screen_feedback" class="container">
        <h3 style="color:var(--primary)">تقرير الأداء النحوي 📝</h3>
        <div id="feedback_list" style="max-height:400px; overflow-y:auto; margin-bottom:20px;"></div>
        <button class="btn-main" onclick="showScreen('screen_menu')">إنهاء والعودة للرئيسية</button>
    </div>

    <div class="fixed-footer">
        <div>تصميم: <b>علي محمد علي</b></div>
        <div>إشراف: <b>هشام الكحالي</b></div>
    </div>

            {q:"(أصبحَ الصبحُ مشرِقاً) إعراب كلمة (مشرقاً) هو:", a:["خبر أصبح منصوب وعلامة نصبه الفتحة الظاهرة على آخره","اسم أصبح مرفوع","حال منصوب"], c:0},
            {q:"(إنَّ الشجرةَ مثمرةٌ) إعراب كلمة (الشجرةَ) هو:", a:["اسم إنَّ منصوب وعلامة نصبه الفتحة الظاهرة على آخره","مبتدأ مرفوع بالضمة","خبر إن مرفوع"], c:0},
            {q:"(المعلمون يخلصون) إعراب كلمة (المعلمون) هو:", a:["مبتدأ مرفوع وعلامة رفعه الواو لأنه جمع مذكر سالم","فاعل مرفوع بالواو","خبر مرفوع بالواو"], c:0},
            {q:"(لا تقصرْ في واجبك) إعراب (تقصرْ) هو:", a:["فعل مضارع مجزوم بـ(لا الناهية) وعلامة جزمه السكون الظاهر على آخره","فعل مضارع منصوب","فعل مضارع مرفوع"], c:0},
            {q:"(كأنَّ الجنديَّ أسدٌ) إعراب كلمة (أسدٌ) هو:", a:["خبر كأنَّ مرفوع وعلامة رفعه الضمة الظاهرة على آخره","اسم كأن منصوب","فاعل مرفوع"], c:0}
        ];

        const fullDetailExplain = `
            <div class="lesson-section">
                <div class="lesson-title">1. الجملة الاسمية (أركانها وإعرابها)</div>
                <p><b>التعريف:</b> هي الجملة التي تبدأ باسم، وتتكون من ركنين أساسيين مرفوعين.</p>
                <div class="lesson-subtitle">الأركان:</div>
                <ul>
                    <li><b>المبتدأ:</b> الاسم الذي نبدأ به الجملة.</li>
                    <li><b>الخبر:</b> الجزء الذي يخبرنا عن المبتدأ ويتمم معنى الجملة.</li>
                </ul>
                <div class="example-box">مثال: <span style="color:blue">العلمُ نورٌ</span></div>
                <table class="parsing-table">
                    <tr><td>العلمُ</td><td>مبتدأ مرفوع وعلامة رفعه الضمة الظاهرة على آخره.</td></tr>
                    <tr><td>نورٌ</td><td>خبر مرفوع وعلامة رفعه الضمة الظاهرة على آخره.</td></tr>
                </table>
            </div>
            <div class="lesson-section">
                <div class="lesson-title">2. الجملة الفعلية (أركانها وإعرابها)</div>
                <p><b>التعريف:</b> هي الجملة التي تبدأ بفعل (ماضٍ أو مضارع أو أمر).</p>
                <div class="lesson-subtitle">الأركان:</div>
                <ul>
                    <li><b>الفعل:</b> الحدث (مثل: قرأ، يلعب، اكتب).</li>
                    <li><b>الفاعل:</b> من قام بالفعل (يكون مرفوعاً).</li>
                    <li><b>المفعول به:</b> من وقع عليه الفعل (يكون منصوباً).</li>
                </ul>
                <div class="example-box">مثال: <span style="color:green">شربَ الطفلُ الحليبَ</span></div>
                <table class="parsing-table">
                    <tr><td>شربَ</td><td>فعل ماض مبني على الفتح.</td></tr>
                    <tr><td>الطفلُ</td><td>فاعل مرفوع وعلامة رفعه الضمة الظاهرة على آخره.</td></tr>
                    <tr><td>الحليبَ</td><td>مفعول به منصوب وعلامة نصبه الفتحة الظاهرة على آخره.</td></tr>
                </table>
            </div>
            <div class="lesson-section">
                <div class="lesson-title">3. الحروف الناسخة (إنَّ وأخواتها)</div>
                <p><b>عملها:</b> تدخل على الجملة الاسمية، <span style="color:red">تنصب</span> المبتدأ (ويسمى اسمها) و <span style="color:red">ترفع</span> الخبر (ويسمى خبرها).</p>
                <div class="example-box">مثال: <span style="color:red">إنَّ الصدقَ منجاةٌ</span></div>
                <table class="parsing-table">
                    <tr><td>إنَّ</td><td>حرف ناسخ يفيد التوكيد.</td></tr>
                    <tr><td>الصدقَ</td><td>اسم إنَّ منصوب وعلامة نصبه الفتحة الظاهرة على آخره.</td></tr>
                    <tr><td>منجاةٌ</td><td>خبر إنَّ مرفوع وعلامة رفعه الضمة الظاهرة على آخره.</td></tr>
                </table>
            </div>
            <div class="lesson-section">
                <div class="lesson-title">4. الأفعال الناسخة (كان وأخواتها)</div>
                <p><b>عملها:</b> تدخل على الجملة الاسمية، <span style="color:purple">ترفع</span> المبتدأ (ويسمى اسمها) و <span style="color:purple">تنصب</span> الخبر (ويسمى خبرها).</p>
                <div class="example-box">مثال: <span style="color:purple">أصبحَ الجوُّ جميلًا</span></div>
                <table class="parsing-table">
                    <tr><td>أصبحَ</td><td>فعل ماضٍ ناقص ناسخ مبني على الفتح.</td></tr>
                    <tr><td>الجوُّ</td><td>اسم أصبحَ مرفوع وعلامة رفعه الضمة الظاهرة على آخره.</td></tr>
                    <tr><td>جميلًا</td><td>خبر أصبحَ منصوب وعلامة نصبه الفتحة الظاهرة على آخره.</td></tr>
                </table>
            </div>
        `;

        let user="", path="", currentQ=0, userAnswers=[], timeLeft=900, timerId=null;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 1000; gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function toggleDrawer() {
            const drawer = document.getElementById('sideDrawer');
            const overlay = document.getElementById('overlay');
            drawer.classList.toggle('open');
            overlay.style.display = drawer.classList.contains('open') ? 'block' : 'none';
        }

        function goToHome() { toggleDrawer(); if(user) showScreen('screen_menu'); else showScreen('screen_login'); }
        function goToExplain() { toggleDrawer(); if(user) showScreen('screen_explain'); else alert('سجل دخولك أولاً!'); }

        function updateStudents() {
            const cls = document.getElementById('sel_class').value;
            const sel = document.getElementById('sel_name');
            sel.innerHTML = '<option value="" disabled selected>-- اختر اسمك --</option>';
            studentsData[cls].forEach(n => { let o = document.createElement('option'); o.value=n; o.innerText=n; sel.appendChild(o); });
        }

        function handleLogin() {
            user = document.getElementById('sel_name').value;
            if(!user) return;
            path = enrichmentList.includes(user) ? "إثرائي" : "علاجي";
            document.getElementById('welcome_msg').innerText = `أهلاً بك يا بطل، ${user.split(' ')[0]}`;
            document.getElementById('path_desc').innerText = `المسار التعليمي: ${path}`;
            document.getElementById('user_init').innerText = user[0];
            document.getElementById('explain_area').innerHTML = fullDetailExplain;
            showScreen('screen_menu');
        }

        function showScreen(id) {
            document.querySelectorAll('.container').forEach(c=>c.style.display='none');
            document.getElementById(id).style.display='block';
            window.scrollTo(0,0);
            if(id === 'screen_activities') renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('main_grid');
            grid.innerHTML = '';
            for(let i=1; i<=4; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn-main';
                btn.style.background = i === 1 ? 'var(--primary)' : '#cbd5e1';
                btn.innerText = `نشاط ${i}`;
                btn.onclick = () => i === 1 ? startQuiz() : alert('أكمل النشاط الأول بنجاح أولاً!');
                grid.appendChild(btn);
            }
        }

        function startQuiz() {
            currentQ = 0; userAnswers = []; timeLeft = 900;
            showScreen('screen_quiz');
            startTimer();
            renderQ();
        }

        function startTimer() {
            if(timerId) clearInterval(timerId);
            timerId = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
                const display = document.getElementById('timer_display');
                display.innerText = `${m}:${s < 10 ? '0' + s : s}`;
                if(timeLeft <= 300) {
                    display.classList.add('timer-warning');
                    if(timeLeft % 60 === 0) playBeep();
                }
                if(timeLeft <= 0) { clearInterval(timerId); showFeedback(); }
            }, 1000);
        }

        function renderQ() {
            const q = activeQs[currentQ];
            const content = document.getElementById('quiz_content');
            content.innerHTML = `<h3 style="color:var(--primary)">السؤال ${currentQ+1} من 30</h3><p style="font-size:1.15rem; background:#f9f9f9; padding:15px; border-right:4px solid var(--gold);">${q.q}</p>`;
            q.a.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.style = "background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; cursor:pointer; border:2px solid #eee; text-align:right;";
                div.innerHTML = `<input type="radio" name="q" id="i${idx}" style="display:none"> ${opt}`;
                div.onclick = () => {
                    document.querySelectorAll('#quiz_content div').forEach(d => { d.style.borderColor = '#eee'; d.style.background = '#fff'; });
                    div.style.borderColor = 'var(--gold)'; div.style.background = '#fffcf0';
                    document.getElementById(`i${idx}`).checked = true;
                    document.getElementById('next_btn').style.display = 'block';
                };
                content.appendChild(div);
            });
        }

        function nextQuestion() {
            const sel = document.querySelector('input[name="q"]:checked');
            userAnswers.push(parseInt(sel.id.replace('i','')));
            currentQ++;
            if(currentQ < activeQs.length) { renderQ(); document.getElementById('next_btn').style.display = 'none'; }
            else showFeedback();
        }

        function showFeedback() {
            clearInterval(timerId);
            showScreen('screen_feedback');
            const list = document.getElementById('feedback_list');
            list.innerHTML = "";
            let score = 0;
            activeQs.forEach((q, i) => {
                const isCorrect = userAnswers[i] === q.c;
                if(isCorrect) score++;
                const div = document.createElement('div');
                div.style = `text-align:right; padding:15px; margin-bottom:10px; border-radius:10px; border-right:5px solid ${isCorrect?'var(--success)':'var(--danger)'}; background:${isCorrect?'#f0fdf4':'#fef2f2'}`;
                div.innerHTML = `<b>س${i+1}: ${q.q}</b><br>إجابتك: ${q.a[userAnswers[i]] || 'لم تجب'} ${isCorrect?'✔️':'❌'}`;
                if(!isCorrect) div.innerHTML += `<br><span style="color:var(--success); font-weight:bold;">الإعراب الصحيح: ${q.a[q.c]}</span>`;
                list.appendChild(div);
            });
            alert(`تم الانتهاء! نتيجتك هي: ${score} من 30`);
        }
    </script>
</body>
</html>
